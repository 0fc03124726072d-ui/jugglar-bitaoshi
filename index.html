<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <div class="reel" id="reel1"></div>
        <div class="reel" id="reel2"></div>
        <div class="reel" id="reel3"></div>
    </div>
    
    <div id="controls" style="display: flex; gap: 10px; margin-top: 20px; justify-content: center;">
        <button onclick="stopReel(0)" style="padding: 10px;">左停止</button>
        <button onclick="stopReel(1)" style="padding: 10px;">中停止</button>
        <button onclick="stopReel(2)" style="padding: 10px;">右停止</button>
        <button onclick="restartAll()" style="padding: 10px; background-color: #ffcc00;">回転！</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
