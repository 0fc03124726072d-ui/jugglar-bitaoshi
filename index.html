<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <div class="reel" id="reel1"></div>
        <div class="reel" id="reel2"></div>
        <div class="reel" id="reel3"></div>
    </div>
    
    <div id="controls">
        <button onclick="stopReel(0)">左停止</button>
        <button onclick="stopReel(1)">中停止</button>
        <button onclick="stopReel(2)">右停止</button>
        <button onclick="restartAll()">回転！</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
